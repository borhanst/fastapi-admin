{# macros/icons.html — Heroicons SVG sprite macro #}

{% macro icon(name, class="") %}
<svg class="w-5 h-5 {{ class }}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
  <use href="/static/icons/heroicons.svg#{{ name }}"/>
</svg>
{% endmacro %}

{% macro icon_solid(name, class="") %}
<svg class="w-5 h-5 {{ class }}" fill="currentColor" viewBox="0 0 24 24">
  <use href="/static/icons/heroicons.svg#{{ name }}"/>
</svg>
{% endmacro %}
