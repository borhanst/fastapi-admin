<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title | default("Admin") }} — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/admin.css">

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    :root {
      --color-primary-500: {{ admin_config.primary_color | default('#6366f1') }};
      --color-primary-600: {{ admin_config.primary_color_dark | default('#4f46e5') }};
    }
  </style>
</head>
<body class="bg-[var(--color-gray-50)] text-[var(--color-gray-900)] font-sans antialiased min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      {% if logo_url %}
      <img src="{{ logo_url }}" alt="Logo" class="h-12 mx-auto mb-4">
      {% else %}
      <div class="w-16 h-16 mx-auto mb-4 rounded-xl bg-[var(--color-primary-600)] flex items-center justify-center">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <use href="/static/icons/heroicons.svg#home"/>
        </svg>
      </div>
      {% endif %}
      <h1 class="text-2xl font-bold text-[var(--color-gray-900)]">{{ title | default("Admin") }}</h1>
      <p class="text-sm text-[var(--color-gray-500)] mt-1">Sign in to your account</p>
    </div>

    {% set messages = get_flash_messages(request) | default([]) %}
    {% if messages %}
    <div class="mb-4 space-y-2">
      {% for msg in messages %}
      <div class="p-3 rounded-lg text-sm
                  {% if msg.level == 'error' %}bg-red-50 text-red-700 border border-red-200
                  {% elif msg.level == 'success' %}bg-green-50 text-green-700 border border-green-200
                  {% elif msg.level == 'warning' %}bg-yellow-50 text-yellow-700 border border-yellow-200
                  {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
        {{ msg.text }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{{ admin_path | default('/admin') }}/login{% if next %}?next={{ next }}{% endif %}"
          class="bg-white rounded-xl shadow-sm border border-[var(--color-gray-200)] p-8">
      {% if error %}
      <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 text-sm border border-red-200">
        {{ error }}
      </div>
      {% endif %}

      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-[var(--color-gray-700)] mb-1">Email address</label>
        <input type="email" id="email" name="email" required autofocus
               class="form-input w-full px-4 py-2.5 rounded-lg border border-[var(--color-gray-300)] bg-white text-[var(--color-gray-900)] focus:ring-2 focus:ring-[var(--color-primary-500)] focus:border-[var(--color-primary-500)] transition-colors"
               placeholder="admin@example.com">
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-[var(--color-gray-700)] mb-1">Password</label>
        <input type="password" id="password" name="password" required
               class="form-input w-full px-4 py-2.5 rounded-lg border border-[var(--color-gray-300)] bg-white text-[var(--color-gray-900)] focus:ring-2 focus:ring-[var(--color-primary-500)] focus:border-[var(--color-primary-500)] transition-colors"
               placeholder="Enter your password">
      </div>

      <button type="submit"
              class="w-full btn-primary px-4 py-2.5 rounded-lg bg-[var(--color-primary-600)] text-white font-medium hover:bg-[var(--color-primary-500)] focus:ring-2 focus:ring-[var(--color-primary-500)] focus:ring-offset-2 transition-colors">
        Sign in
      </button>
    </form>
  </div>

</body>
</html>
